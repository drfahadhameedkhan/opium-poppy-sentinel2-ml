# Machine Learning Model Configuration
# ======================================

random_forest:
  n_estimators: 500
  max_depth: 20
  min_samples_split: 5
  min_samples_leaf: 2
  random_state: 42
  n_jobs: -1

xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  eval_metric: "mlogloss"

cnn_lstm:
  n_timesteps: 26
  n_features: 13
  n_classes: 5
  
  architecture:
    conv1d_1:
      filters: 64
      kernel_size: 3
      activation: "relu"
    batch_norm_1: true
    dropout_1: 0.3
    
    conv1d_2:
      filters: 128
      kernel_size: 3
      activation: "relu"
    batch_norm_2: true
    dropout_2: 0.3
    
    max_pooling_1:
      pool_size: 2
    
    lstm_1:
      units: 128
      return_sequences: true
      dropout: 0.2
    
    lstm_2:
      units: 128
      return_sequences: false
      dropout: 0.2
    
    dense_1:
      units: 64
      activation: "relu"
  
  training:
    epochs: 100
    batch_size: 256
    optimizer: "adam"
    loss: "categorical_crossentropy"
    validation_split: 0.2

training:
  test_size: 0.2
  random_state: 42
  stratified: true
  spatial_block_cv: true
  n_splits: 5
  block_size_km: 50
